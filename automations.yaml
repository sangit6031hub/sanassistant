- id: '1704825676538'
  alias: Power Saving - Turn OFF Devices
  description: ''
  trigger:
  - minutes: /30
    platform: time_pattern
  condition:
  - condition: and
    conditions:
    - condition: sun
      before: sunset
      after: sunrise
      before_offset: -01:00:00
      after_offset: +00:30:00
    - condition: state
      entity_id: input_boolean.energy_saver
      state: 'on'
    - condition: numeric_state
      entity_id: sensor.light_sensor_hall_illuminance_lux
      above: 50
  action:
  - service: switch.turn_off
    metadata: {}
    data: {}
    target:
      entity_id: switch.security_switch_group
  - service: light.turn_off
    metadata: {}
    data: {}
    target:
      entity_id: light.security_light_group
  mode: single
