- id: '1705634765942'
  alias: Morning
  description: ''
  triggers:
  - event: sunrise
    offset: 01:00:00
    trigger: sun
    enabled: false
  - at: 06:30:00
    trigger: time
  conditions: []
  actions:
  - metadata: {}
    data: {}
    target:
      entity_id:
      - input_boolean.energy_saver
      - input_boolean.voice_notifications
    action: input_boolean.turn_on
  - if:
    - condition: state
      entity_id: alarm_control_panel.securityalarm3100
      state: armed_night
    then:
    - metadata: {}
      data:
        value: 0.3
      target:
        entity_id: input_number.speaker_volume
      action: input_number.set_value
    - delay:
        hours: 0
        minutes: 0
        seconds: 2
        milliseconds: 0
    - action: alarm_control_panel.alarm_disarm
      entity_id: alarm_control_panel.securityalarm3100
      metadata: {}
      data:
        code: '5363'
    - target:
        entity_id:
        - media_player.speakers_group
      data:
        media:
          media_content_id: media-source://media_source/local/rooster-sound.mp3
          media_content_type: audio/mpeg
          metadata:
            title: emergency-alarm.mp3
            thumbnail:
            media_class: music
            children_media_class:
            navigateIds:
            - {}
            - media_content_type: app
              media_content_id: media-source://media_source
      action: media_player.play_media
  - delay:
      hours: 0
      minutes: 0
      seconds: 2
      milliseconds: 0
  - metadata: {}
    data:
      value: 0.5
    target:
      entity_id: input_number.speaker_volume
    action: input_number.set_value
  mode: single
