blueprint:
  name: HVAC Cycle Temperature (Step)
  description: >
    Controls a climate device with morning, noon, evening, night temps.
    Uses step temperature changes based on time of day.
  domain: automation
  input:
    climate_controller:
      name: Climate Controller
      selector:
        entity:
          domain: climate

    energy_controller:
      name: Energy Controller
      description: Only run when this boolean is on.
      selector:
        entity:
          domain: input_boolean

    morning_time:
      name: Morning Time
      default: '05:00:00'
      selector:
        time: {}
    morning_temp:
      name: Morning Temperature
      default: 75
      selector:
        number:
          min: 55
          max: 90
          step: 1
          unit_of_measurement: °F

    noon_time:
      name: Noon Time
      default: '13:00:00'
      selector:
        time: {}
    noon_temp:
      name: Noon Temperature
      default: 78
      selector:
        number:
          min: 55
          max: 90
          step: 1
          unit_of_measurement: °F

    evening_time:
      name: Evening Time
      default: '18:00:00'
      selector:
        time: {}
    evening_temp:
      name: Evening Temperature
      default: 76
      selector:
        number:
          min: 55
          max: 90
          step: 1
          unit_of_measurement: °F

    night_time:
      name: Night Time
      default: '20:00:00'
      selector:
        time: {}
    night_temp:
      name: Night Temperature
      default: 73
      selector:
        number:
          min: 55
          max: 90
          step: 1
          unit_of_measurement: °F

trigger:
  - platform: time_pattern
    minutes: "/1"

condition: []

action:
  - variables:
      current_time: "{{ now().strftime('%H:%M:%S') }}"
      morning_time: !input morning_time
      noon_time: !input noon_time
      evening_time: !input evening_time
      night_time: !input night_time
      morning_temp: !input morning_temp
      noon_temp: !input noon_temp
      evening_temp: !input evening_temp
      night_temp: !input night_temp

      temp: >-
        {% if current_time >= morning_time and current_time < noon_time %}
          {{ morning_temp }}
        {% elif current_time >= noon_time and current_time < evening_time %}
          {{ noon_temp }}
        {% elif current_time >= evening_time and current_time < night_time %}
          {{ evening_temp }}
        {% else %}
          {{ night_temp }}
        {% endif %}

  - service: logbook.log
    data:
      name: HVAC Cycle Debug
      message: >-
        Time={{ current_time }} | Target={{ temp }}°F
        | Morning={{ morning_temp }}@{{ morning_time }}
        | Noon={{ noon_temp }}@{{ noon_time }}
        | Evening={{ evening_temp }}@{{ evening_time }}
        | Night={{ night_temp }}@{{ night_time }}

  - if:
      - condition: state
        entity_id: !input energy_controller
        state: "on"
    then:
      - service: climate.set_temperature
        data:
          entity_id: !input climate_controller
          temperature: "{{ temp }}"
      - service: logbook.log
        data:
          name: HVAC Cycle Debug
          message: "Set thermostat {{ climate_controller }} → {{ temp }}°F"
    else:
      - service: logbook.log
        data:
          name: HVAC Cycle Debug
          message: "Energy controller OFF, no temp change"

mode: single