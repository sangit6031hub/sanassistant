blueprint:
  name: HVAC Cycle Temperature (Step)
  description: >
    Controls a climate device with morning, noon, evening, night temps.
    Uses step temperature changes based on time of day with away mode override.
  domain: automation
  input:
    climate_controller:
      name: Climate Controller
      description: This Climate Controller controls the temperature of the home.
      selector:
        entity:
          domain: climate

    alarm_controller:
      name: Alarm Controller
      description: This alarm controller to set temperature based on home away or default.
      selector:
        entity:
          domain: alarm_control_panel

    energy_controller:
      name: Energy Controller
      description: Only run when this boolean is on.
      selector:
        entity:
          domain: input_boolean

    minmax_difference:
      name: MinMax Temperature Difference
      description: Temperature range between min and max for Heat/Cool mode (1-10°F)
      default: 5
      selector:
        number:
          min: 1
          max: 10
          step: 1
          unit_of_measurement: °F
    
    away_temp:
      name: Away Temperature
      default: 90
      description:
        (Away) The temperature for the day when not in home.
      selector:
        number:
          min: 55
          max: 100
          step: 1
          unit_of_measurement: °F

    morning_time:
      name: Morning Time
      default: "05:00:00"
      selector:
        time: {}
    morning_temp:
      name: Morning Temperature
      default: 75
      selector:
        number:
          min: 55
          max: 90
          step: 1
          unit_of_measurement: °F

    noon_time:
      name: Noon Time
      default: "13:00:00"
      selector:
        time: {}
    noon_temp:
      name: Noon Temperature
      default: 78
      selector:
        number:
          min: 55
          max: 90
          step: 1
          unit_of_measurement: °F

    evening_time:
      name: Evening Time
      default: "18:00:00"
      selector:
        time: {}
    evening_temp:
      name: Evening Temperature
      default: 76
      selector:
        number:
          min: 55
          max: 90
          step: 1
          unit_of_measurement: °F

    night_time:
      name: Night Time
      default: "20:00:00"
      selector:
        time: {}
    night_temp:
      name: Night Temperature
      default: 73
      selector:
        number:
          min: 55
          max: 90
          step: 1
          unit_of_measurement: °F

trigger:
  - platform: time_pattern
    minutes: "/1"

condition: []

action:
  - variables:
      current_time: "{{ now().strftime('%H:%M:%S') }}"
      climate_entity: !input climate_controller
      alarm_controller: !input alarm_controller
      minmax_diff: !input minmax_difference
      morning_time: !input morning_time
      noon_time: !input noon_time
      evening_time: !input evening_time
      night_time: !input night_time
      morning_temp: !input morning_temp
      noon_temp: !input noon_temp
      evening_temp: !input evening_temp
      night_temp: !input night_temp
      away_temp: !input away_temp

      # Get current HVAC mode from climate controller - FIXED: use 'hvac_mode' not 'hvac_modes'
      hvac_mode: "{{ states(climate_entity) }}"
      
      # Check alarm state
      alarm_state: "{{ states(alarm_controller) }}"
      
      # Determine base target temperature - use away temp if alarm is armed_away, otherwise use time-based temp
      base_temp: >-
        {% if alarm_state == 'armed_away' %}
          {{ away_temp }}
        {% else %}
          {% if current_time >= morning_time and current_time < noon_time %}
            {{ morning_temp }}
          {% elif current_time >= noon_time and current_time < evening_time %}
            {{ noon_temp }}
          {% elif current_time >= evening_time and current_time < night_time %}
            {{ evening_temp }}
          {% else %}
            {{ night_temp }}
          {% endif %}
        {% endif %}

      # For heat_cool mode, calculate min and max temperatures
      target_temp_low: >-
        {% if hvac_mode == 'heat_cool' %}
          {{ (base_temp - minmax_diff) | round(0) }}
        {% else %}
          {{ 0 }}  {# Not used in single mode #}
        {% endif %}

      target_temp_high: >-
        {% if hvac_mode == 'heat_cool' %}
          {{ (base_temp + minmax_diff) | round(0) }}
        {% else %}
          {{ 0 }}  {# Not used in single mode #}
        {% endif %}

  - service: logbook.log
    data:
      name: HVAC Cycle Debug
      message: >-
        DEBUG: hvac_mode='{{ hvac_mode }}' | Time={{ current_time }} | Alarm={{ alarm_state }} | Base={{ base_temp }}°F
        {% if hvac_mode == 'heat_cool' %} | Range={{ target_temp_low }}°F-{{ target_temp_high }}°F (Diff={{ minmax_diff }}°F){% endif %}
        | Morning={{ morning_temp }}@{{ morning_time }}
        | Noon={{ noon_temp }}@{{ noon_time }}
        | Evening={{ evening_temp }}@{{ evening_time }}
        | Night={{ night_temp }}@{{ night_time }}
        | Away={{ away_temp }}

  - if:
      - condition: state
        entity_id: !input energy_controller
        state: "on"
    then:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ hvac_mode == 'heat_cool' }}"
            sequence:
              - service: climate.set_temperature
                data:
                  entity_id: !input climate_controller
                  target_temp_low: "{{ target_temp_low }}"
                  target_temp_high: "{{ target_temp_high }}"
              - service: logbook.log
                data:
                  name: HVAC Cycle Debug
                  message: "Set thermostat {{ climate_controller }} → {{ target_temp_low }}°F-{{ target_temp_high }}°F range (Mode: {{ hvac_mode }})"
          - conditions:
              - condition: template
                value_template: "{{ hvac_mode in ['cool', 'heat'] }}"
            sequence:
              - service: climate.set_temperature
                data:
                  entity_id: !input climate_controller
                  temperature: "{{ base_temp }}"
              - service: logbook.log
                data:
                  name: HVAC Cycle Debug
                  message: "Set thermostat {{ climate_controller }} → {{ base_temp }}°F (Mode: {{ hvac_mode }})"
    else:
      - service: logbook.log
        data:
          name: HVAC Cycle Debug
          message: "Energy controller OFF, no temp change"

mode: single