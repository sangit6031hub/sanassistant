blueprint:
  name: HVAC Cycle Temperature (Step / Ramp)
  description: >
    Controls a climate device with morning, noon, evening, night temps.
    Supports step (hold temp) or ramp (smooth interpolation) strategies.
  domain: automation
  input:
    climate_controller:
      name: Climate Controller
      selector:
        entity:
          domain: climate

    energy_controller:
      name: Energy Controller
      description: Only run when this boolean is on.
      selector:
        entity:
          domain: input_boolean

    ramp_strategy:
      name: Strategy
      description: Choose between "step" or "ramp" temperature changes
      default: ramp
      selector:
        select:
          options:
            - step
            - ramp

    # Morning phase
    morning_time:
      name: Morning Time
      default: '05:00:00'
      selector:
        time: {}
    morning_temp:
      name: Morning Temperature
      default: 75
      selector:
        number:
          min: 55
          max: 90
          step: 1
          unit_of_measurement: °F

    # Noon phase
    noon_time:
      name: Noon Time
      default: '13:00:00'
      selector:
        time: {}
    noon_temp:
      name: Noon Temperature
      default: 78
      selector:
        number:
          min: 55
          max: 90
          step: 1
          unit_of_measurement: °F

    # Evening phase
    evening_time:
      name: Evening Time
      default: '18:00:00'
      selector:
        time: {}
    evening_temp:
      name: Evening Temperature
      default: 76
      selector:
        number:
          min: 55
          max: 90
          step: 1
          unit_of_measurement: °F

    # Night phase
    night_time:
      name: Night Time
      default: '23:59:00'
      selector:
        time: {}
    night_temp:
      name: Night Temperature
      default: 73
      selector:
        number:
          min: 55
          max: 90
          step: 1
          unit_of_measurement: °F

trigger:
  - platform: time_pattern
    minutes: "/1"

condition: []

action:
  - variables:
      cc: !input climate_controller
      ec: !input energy_controller
      strategy: !input ramp_strategy

      # Phase times and temps
      morning_s: "{{ as_timestamp(today_at(morning_time)) % 86400 }}"
      morning_t: !input morning_temp
      noon_s: "{{ as_timestamp(today_at(noon_time)) % 86400 }}"
      noon_t: !input noon_temp
      evening_s: "{{ as_timestamp(today_at(evening_time)) % 86400 }}"
      evening_t: !input evening_temp
      night_s: "{{ as_timestamp(today_at(night_time)) % 86400 }}"
      night_t: !input night_temp

      now_s: "{{ now().hour*3600 + now().minute*60 + now().second }}"

      temp: >-
        {% if strategy == 'step' %}
          {% if morning_s <= now_s < noon_s %}
            {{ morning_t }}
          {% elif noon_s <= now_s < evening_s %}
            {{ noon_t }}
          {% elif evening_s <= now_s < night_s %}
            {{ evening_t }}
          {% else %}
            {{ night_t }}
          {% endif %}
        {% else %}
          {% set t = now_s %}
          {% if morning_s <= t < noon_s %}
            {{ (morning_t + (noon_t - morning_t) * (t - morning_s) / (noon_s - morning_s)) | float }}
          {% elif noon_s <= t < evening_s %}
            {{ (noon_t + (evening_t - noon_t) * (t - noon_s) / (evening_s - noon_s)) | float }}
          {% elif evening_s <= t < night_s %}
            {{ (evening_t + (night_t - evening_t) * (t - evening_s) / (night_s - evening_s)) | float }}
          {% else %}
            {{ (night_t + (morning_t - night_t) * ((t - night_s) % 86400) / ((morning_s + 86400) - night_s)) | float }}
          {% endif %}
        {% endif %}

  - if:
      - condition: template
        value_template: "{{ (temp - state_attr(cc, 'temperature')|float(0))|abs > 0.1 }}"
      - condition: template
        value_template: "{{ states(ec) == 'on' }}"
    then:
      - service: climate.set_temperature
        data:
          entity_id: "{{ cc }}"
          temperature: "{{ temp | round(1) }}"

mode: single
