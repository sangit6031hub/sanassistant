blueprint:
  name: HVAC Cycle Temperature (Step / Ramp)
  description: >
    Controls a climate device with morning, noon, evening, night temps.
    Supports step (hold temp) or ramp (smooth interpolation) strategies.
    Always sets temperature and logs debug info.
  domain: automation
  input:
    climate_controller:
      name: Climate Controller
      selector:
        entity:
          domain: climate

    energy_controller:
      name: Energy Controller
      description: Only run when this boolean is on.
      selector:
        entity:
          domain: input_boolean

    ramp_strategy:
      name: Strategy
      description: Choose between "step" or "ramp" temperature changes
      default: step
      selector:
        select:
          options:
            - step
            - ramp

    morning_time:
      name: Morning Time
      default: '05:00:00'
      selector:
        time: {}
    morning_temp:
      name: Morning Temperature
      default: 75
      selector:
        number:
          min: 55
          max: 90
          step: 1
          unit_of_measurement: °F

    noon_time:
      name: Noon Time
      default: '13:00:00'
      selector:
        time: {}
    noon_temp:
      name: Noon Temperature
      default: 78
      selector:
        number:
          min: 55
          max: 90
          step: 1
          unit_of_measurement: °F

    evening_time:
      name: Evening Time
      default: '18:00:00'
      selector:
        time: {}
    evening_temp:
      name: Evening Temperature
      default: 76
      selector:
        number:
          min: 55
          max: 90
          step: 1
          unit_of_measurement: °F

    night_time:
      name: Night Time
      default: '20:00:00'
      selector:
        time: {}
    night_temp:
      name: Night Temperature
      default: 73
      selector:
        number:
          min: 55
          max: 90
          step: 1
          unit_of_measurement: °F

trigger:
  - platform: time_pattern
    minutes: "/1"

condition: []

action:
  - variables:
      strategy: !input ramp_strategy
      morning_temp: !input morning_temp
      noon_temp: !input noon_temp
      evening_temp: !input evening_temp
      night_temp: !input night_temp
      morning_time: !input morning_time
      noon_time: !input noon_time
      evening_time: !input evening_time
      night_time: !input night_time

      # Convert times to seconds since midnight
      morning_s: "{{ as_timestamp(today_at(morning_time)) | float }}"
      noon_s: "{{ as_timestamp(today_at(noon_time)) | float }}"
      evening_s: "{{ as_timestamp(today_at(evening_time)) | float }}"
      night_s: "{{ as_timestamp(today_at(night_time)) | float }}"

      now_s: "{{ now().timestamp() | float }}"

      # Set temperatures
      temp: >-
        {% set m = morning_temp | float %}
        {% set n = noon_temp | float %}
        {% set e = evening_temp | float %}
        {% set ni = night_temp | float %}
        {% if strategy == 'step' %}
          {% if now_s < noon_s %}
            {{ m }}
          {% elif now_s < evening_s %}
            {{ n }}
          {% elif now_s < night_s %}
            {{ e }}
          {% else %}
            {{ ni }}
          {% endif %}
        {% else %}
          {% if now_s < noon_s %}
            {{ (m + (n - m) * (now_s - morning_s) / (noon_s - morning_s)) | round(1) }}
          {% elif now_s < evening_s %}
            {{ (n + (e - n) * (now_s - noon_s) / (evening_s - noon_s)) | round(1) }}
          {% elif now_s < night_s %}
            {{ (e + (ni - e) * (now_s - evening_s) / (night_s - evening_s)) | round(1) }}
          {% else %}
            {{ (ni + (m - ni) * (now_s - night_s) / ((morning_s + 86400) - night_s)) | round(1) }}
          {% endif %}
        {% endif %}

  - service: logbook.log
    data:
      name: HVAC Cycle Debug
      message: >-
        Now={{ now_s }}s | Target={{ temp }}°F | Strategy={{ strategy }}
        | Morning={{ morning_temp }}@{{ morning_s }}
        | Noon={{ noon_temp }}@{{ noon_s }}
        | Evening={{ evening_temp }}@{{ evening_s }}
        | Night={{ night_temp }}@{{ night_s }}

  - if:
      - condition: state
        entity_id: !input energy_controller
        state: "on"
    then:
      - service: climate.set_temperature
        data:
          entity_id: !input climate_controller
          temperature: "{{ temp | round(1) }}"
      - service: logbook.log
        data:
          name: HVAC Cycle Debug
          message: "Set thermostat {{ climate_controller }} → {{ temp | round(1) }}°F"
    else:
      - service: logbook.log
        data:
          name: HVAC Cycle Debug
          message: "Energy controller OFF, no temp change"

mode: single