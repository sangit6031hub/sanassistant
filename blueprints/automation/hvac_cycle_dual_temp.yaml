blueprint:
  name: HVAC Cycle Temperature (Dual)
  description: >
    Controls a climate device with morning, noon, evening, night temps.
    Uses step temperature changes based on time of day with heating/cooling modes.
  domain: automation
  input:
    climate_controller:
      name: Climate Controller
      selector:
        entity:
          domain: climate

    energy_controller:
      name: Energy Controller
      description: Only run when this boolean is on.
      selector:
        entity:
          domain: input_boolean

    hvac_mode:
      name: HVAC Mode
      description: Select heating, cooling, or both modes
      default: cool
      selector:
        select:
          options:
            - label: "Cool Only"
              value: "cool"
            - label: "Heat Only"
              value: "heat"
            - label: "Heat and Cool"
              value: "heat_cool"

    morning_time:
      name: Morning Time
      default: "05:00:00"
      selector:
        time: {}
    morning_temp_cool:
      name: Morning Cooling Temperature
      default: 75
      selector:
        number:
          min: 55
          max: 90
          step: 1
          unit_of_measurement: °F
    morning_temp_heat:
      name: Morning Heating Temperature
      default: 68
      selector:
        number:
          min: 55
          max: 90
          step: 1
          unit_of_measurement: °F

    noon_time:
      name: Noon Time
      default: "13:00:00"
      selector:
        time: {}
    noon_temp_cool:
      name: Noon Cooling Temperature
      default: 78
      selector:
        number:
          min: 55
          max: 90
          step: 1
          unit_of_measurement: °F
    noon_temp_heat:
      name: Noon Heating Temperature
      default: 70
      selector:
        number:
          min: 55
          max: 90
          step: 1
          unit_of_measurement: °F

    evening_time:
      name: Evening Time
      default: "18:00:00"
      selector:
        time: {}
    evening_temp_cool:
      name: Evening Cooling Temperature
      default: 76
      selector:
        number:
          min: 55
          max: 90
          step: 1
          unit_of_measurement: °F
    evening_temp_heat:
      name: Evening Heating Temperature
      default: 69
      selector:
        number:
          min: 55
          max: 90
          step: 1
          unit_of_measurement: °F

    night_time:
      name: Night Time
      default: "20:00:00"
      selector:
        time: {}
    night_temp_cool:
      name: Night Cooling Temperature
      default: 73
      selector:
        number:
          min: 55
          max: 90
          step: 1
          unit_of_measurement: °F
    night_temp_heat:
      name: Night Heating Temperature
      default: 67
      selector:
        number:
          min: 55
          max: 90
          step: 1
          unit_of_measurement: °F

trigger:
  - platform: time_pattern
    minutes: "/1"

condition: []

action:
  - variables:
      current_time: "{{ now().strftime('%H:%M:%S') }}"
      hvac_mode: !input hvac_mode
      morning_time: !input morning_time
      noon_time: !input noon_time
      evening_time: !input evening_time
      night_time: !input night_time

      # Determine target temperature based on time and mode
      target_temp: >-
        {% if current_time >= morning_time and current_time < noon_time %}
          {% if hvac_mode == 'cool' or hvac_mode == 'heat_cool' %}
            {{ morning_temp_cool }}
          {% else %}
            {{ morning_temp_heat }}
          {% endif %}
        {% elif current_time >= noon_time and current_time < evening_time %}
          {% if hvac_mode == 'cool' or hvac_mode == 'heat_cool' %}
            {{ noon_temp_cool }}
          {% else %}
            {{ noon_temp_heat }}
          {% endif %}
        {% elif current_time >= evening_time and current_time < night_time %}
          {% if hvac_mode == 'cool' or hvac_mode == 'heat_cool' %}
            {{ evening_temp_cool }}
          {% else %}
            {{ evening_temp_heat }}
          {% endif %}
        {% else %}
          {% if hvac_mode == 'cool' or hvac_mode == 'heat_cool' %}
            {{ night_temp_cool }}
          {% else %}
            {{ night_temp_heat }}
          {% endif %}
        {% endif %}

      # For heat_cool mode, set both target_temp_low and target_temp_high
      target_temp_low: >-
        {% if hvac_mode == 'heat_cool' %}
          {% if current_time >= morning_time and current_time < noon_time %}
            {{ morning_temp_heat }}
          {% elif current_time >= noon_time and current_time < evening_time %}
            {{ noon_temp_heat }}
          {% elif current_time >= evening_time and current_time < night_time %}
            {{ evening_temp_heat }}
          {% else %}
            {{ night_temp_heat }}
          {% endif %}
        {% else %}
          {{ 0 }}  {# Not used in single mode #}
        {% endif %}

      target_temp_high: >-
        {% if hvac_mode == 'heat_cool' %}
          {% if current_time >= morning_time and current_time < noon_time %}
            {{ morning_temp_cool }}
          {% elif current_time >= noon_time and current_time < evening_time %}
            {{ noon_temp_cool }}
          {% elif current_time >= evening_time and current_time < night_time %}
            {{ evening_temp_cool }}
          {% else %}
            {{ night_temp_cool }}
          {% endif %}
        {% else %}
          {{ 0 }}  {# Not used in single mode #}
        {% endif %}

  - service: logbook.log
    data:
      name: HVAC Cycle Debug
      message: >-
        Time={{ current_time }} | Mode={{ hvac_mode }} | Target={{ target_temp }}°F
        {% if hvac_mode == 'heat_cool' %} | Range={{ target_temp_low }}°F-{{ target_temp_high }}°F{% endif %}
        | Morning={{ morning_temp_cool }}/{{ morning_temp_heat }}@{{ morning_time }}
        | Noon={{ noon_temp_cool }}/{{ noon_temp_heat }}@{{ noon_time }}
        | Evening={{ evening_temp_cool }}/{{ evening_temp_heat }}@{{ evening_time }}
        | Night={{ night_temp_cool }}/{{ night_temp_heat }}@{{ night_time }}

  - if:
      - condition: state
        entity_id: !input energy_controller
        state: "on"
    then:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ hvac_mode == 'heat_cool' }}"
            sequence:
              - service: climate.set_temperature
                data:
                  entity_id: !input climate_controller
                  target_temp_low: "{{ target_temp_low }}"
                  target_temp_high: "{{ target_temp_high }}"
              - service: logbook.log
                data:
                  name: HVAC Cycle Debug
                  message: "Set thermostat {{ climate_controller }} → {{ target_temp_low }}°F-{{ target_temp_high }}°F range"
          - conditions:
              - condition: template
                value_template: "{{ hvac_mode in ['cool', 'heat'] }}"
            sequence:
              - service: climate.set_temperature
                data:
                  entity_id: !input climate_controller
                  temperature: "{{ target_temp }}"
              - service: logbook.log
                data:
                  name: HVAC Cycle Debug
                  message: "Set thermostat {{ climate_controller }} → {{ target_temp }}°F ({{ hvac_mode }})"
    else:
      - service: logbook.log
        data:
          name: HVAC Cycle Debug
          message: "Energy controller OFF, no temp change"

mode: single
