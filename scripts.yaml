disarmed_script:
  alias: Alarm Disarmed Script
  sequence:
  - metadata: {}
    data:
      value: 0.5
    target:
      entity_id: input_number.speaker_volume
    action: input_number.set_value
  - target:
      entity_id:
      - media_player.speakers_group
    data: {}
    action: media_player.media_stop
  - device_id: 41d0350e99e72f613319bfbaef984a98
    domain: select
    entity_id: 26ccda54be221973d1dd4a04bc7b0fbd
    type: select_option
    option: home
  mode: single
  icon: mdi:alarm-light-off
  description: ''
door_open_script:
  alias: Door Open Script
  sequence:
  - service: media_player.play_media
    target:
      entity_id:
      - media_player.speakers_group
    data:
      media_content_type: audio/mpeg
      media_content_id: media-source://media_source/local/beep_tone.mp3
    metadata:
      title: emergency-alarm.mp3
      thumbnail:
      media_class: music
      children_media_class:
      navigateIds:
      - {}
      - media_content_type: app
        media_content_id: media-source://media_source
    enabled: false
  - delay:
      hours: 0
      minutes: 0
      seconds: 3
      milliseconds: 0
    enabled: false
  - service: media_player.play_media
    target:
      entity_id:
      - media_player.speakers_group
    data:
      media_content_type: provider
      media_content_id: media-source://tts/reversotts?message="{{ expand('binary_sensor.door_sensor_group')
        | selectattr('state','eq','on') | map(attribute='name') | list | join(', ')
        }}"  are left OPEN for long time &language=Laura-US-English
    metadata:
      title: emergency-alarm.mp3
      thumbnail:
      media_class: music
      children_media_class:
      navigateIds:
      - {}
      - media_content_type: app
        media_content_id: media-source://media_source
  description: ''
  icon: mdi:door-open
