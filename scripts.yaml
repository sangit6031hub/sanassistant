ac_is_on_script:
  sequence:
  - if:
    - condition: or
      conditions:
      - condition: state
        entity_id: climate.ecobeethermostat
        attribute: hvac_action
        state: 'off'
      - condition: state
        entity_id: climate.ecobeethermostat
        state: idle
        attribute: hvac_action
    then: []
    else:
    - action: script.tts_common_announcement
      data:
        message: Air conditioner is Running
      metadata:
        title: Door open script
        thumbnail:
        media_class: music
        children_media_class:
  alias: AC is ON Script
  description: ''
  icon: mdi:air-conditioner
tts_common_announcement:
  alias: TTS Common Announcement
  description: Announce a custom message to Google Home speakers
  mode: single
  sequence:
  - if:
    - condition: state
      entity_id: input_boolean.voice_notifications
      state: 'on'
    then:
    - metadata: {}
      data:
        value: 0.7
      target:
        entity_id: input_number.speaker_volume
      action: input_number.set_value
      alias: Increase Volume
    - delay:
        hours: 0
        minutes: 0
        seconds: 1
        milliseconds: 0
    - action: tts.speak
      target:
        entity_id: tts.openai_tts
      data:
        cache: true
        media_player_entity_id: media_player.speakers_group
        message: '{{ message }}'
        options:
          chime: true
          instructions: Speak loud and clear
    - delay:
        hours: 0
        minutes: 0
        seconds: 5
        milliseconds: 0
    - alias: Decrease Volumne
      metadata: {}
      data:
        value: 0.5
      action: input_number.set_value
      target:
        entity_id: input_number.speaker_volume
tts_on_demand_message_script:
  alias: TTS On-Demand Message Script
  description: Announce a typed message to the Google Home speaker
  mode: single
  sequence:
  - data:
      message: '{{ states(''input_text.tts_text_input'') }}'
    action: script.tts_common_announcement
  - target:
      entity_id: input_text.tts_text_input
    data:
      value: ''
    action: input_text.set_value
