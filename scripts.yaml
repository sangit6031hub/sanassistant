siren:
  alias: Alarm Trigerred - Siren
  sequence:
  - metadata: {}
    data:
      value: 1
    target:
      entity_id: input_number.speaker_volume
    action: input_number.set_value
  - repeat:
      sequence:
      - target:
          entity_id:
          - media_player.speakers_group
        data:
          media_content_id: media-source://media_source/local/emergency-alarm.mp3
          media_content_type: audio/mpeg
        metadata:
          title: emergency-alarm.mp3
          thumbnail:
          media_class: music
          children_media_class:
          navigateIds:
          - {}
          - media_content_type: app
            media_content_id: media-source://media_source
        action: media_player.play_media
      - delay:
          hours: 0
          minutes: 0
          seconds: 15
          milliseconds: 0
      until:
      - condition: state
        entity_id: alarm_control_panel.securityalarm3100
        state: disarmed
  mode: single
  icon: mdi:alarm-light
  description: ''
