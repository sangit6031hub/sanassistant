notification_script:
  alias: Notification script
  sequence:
  - service: notify.email_notification
    data:
      message: Home security system notification '{{ trigger.entity_id }}'
      title: Security system notification
      target: 3095324552@vtext.com
  - service: notify.email_notification
    data:
      message: Home security system notification '{{ trigger.entity_id }}'
      title: Security system notification
      target: san6031@gmail.com
  mode: single
  icon: mdi:message-processing
disarmed_script:
  alias: Disarmed Script
  sequence:
  - service: input_number.set_value
    metadata: {}
    data:
      value: 0.5
    target:
      entity_id: input_number.speaker_volume
  - service: media_player.media_stop
    target:
      entity_id:
      - media_player.speakers_group
    data: {}
  mode: single
  icon: mdi:alarm-light-off
